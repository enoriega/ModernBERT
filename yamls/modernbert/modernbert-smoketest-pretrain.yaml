# Smoke-test pretrain: reduced ModernBERT, 1 epoch over a data sample,
# sequence packing enabled, full metric logging.

data_local: data_sample        # <-- point to your (decompressed) MDS dir, or the subset made below
data_remote:                   # blank => must be local
data_sample_split: train       # <-- your split subfolder name (holds index.json + *.mds)

max_seq_len: 512               # <-- must be <= the length your input_ids were tokenized at
tokenizer_name: answerdotai/ModernBERT-base
mlm_probability: 0.3
count_padding_tokens: false

run_name: modernbert-smoketest

# Model — reduced capacity (~a few M params)
model:
  name: flex_bert
  pretrained_model_name: bert-base-uncased  # legacy requirement, keep as-is
  tokenizer_name: ${tokenizer_name}
  disable_train_metrics: false  # compute + log train MLM metrics (loss is always logged)
  model_config:
    vocab_size: 50368
    init_method: full_megatron
    num_hidden_layers: 4          # was 22
    hidden_size: 256              # was 768
    intermediate_size: 384        # was 1152 (GLU ~1.5x)
    num_attention_heads: 4        # head size 64
    attention_layer: rope
    attention_probs_dropout_prob: 0.0
    attn_out_bias: false
    attn_out_dropout_prob: 0.1
    attn_qkv_bias: false
    bert_layer: prenorm
    embed_dropout_prob: 0.0
    embed_norm: true
    final_norm: true
    skip_first_prenorm: true
    embedding_layer: sans_pos
    loss_function: fa_cross_entropy
    loss_kwargs:
      reduction: mean
    mlp_dropout_prob: 0.0
    mlp_in_bias: false
    mlp_layer: glu
    mlp_out_bias: false
    normalization: layernorm
    norm_kwargs:
      eps: 1e-5
      bias: false
    hidden_act: gelu
    head_pred_act: gelu
    activation_function: gelu
    padding: unpadded            # required for sequence packing
    rotary_emb_dim: null
    rotary_emb_base: 10000.0
    rotary_emb_scale_base: null
    rotary_emb_interleaved: false
    allow_embedding_resizing: true
    sliding_window: 128
    global_attn_every_n_layers: 3
    unpad_embeddings: true       # required for sequence packing
    compile_model: false         # off for a fast, dependency-light smoke test
    masked_prediction: true

# Dataloaders
train_loader:
  name: text
  dataset:
    local: ${data_local}
    remote: ${data_remote}
    split: ${data_sample_split}
    tokenizer_name: ${tokenizer_name}
    max_seq_len: ${max_seq_len}
    shuffle: true
    mlm_probability: ${mlm_probability}
    streaming: false             # NoStreamingDataset -> enables sequence packing path
  drop_last: true
  num_workers: 2
  sequence_packing: true
  # NOTE: no batch_size_warmup_* here, so the full batch size is used from step 0.

eval_loader:
  name: text
  dataset:
    local: ${data_local}
    remote: ${data_remote}
    split: ${data_sample_split}   # reuse the sample; swap to a val split if you have one
    tokenizer_name: ${tokenizer_name}
    max_seq_len: ${max_seq_len}
    shuffle: false
    mlm_probability: 0.15
    streaming: false
  drop_last: false
  num_workers: 2
  sequence_packing: false

# Optimization — dur-relative so it works for a short run
scheduler:
  name: linear_decay_with_warmup
  t_warmup: 0.1dur
  alpha_f: 0.02

optimizer:
  name: decoupled_stableadamw
  lr: 1e-3
  betas:
  - 0.9
  - 0.98
  eps: 1.0e-06
  weight_decay: 1.0e-5
  filter_bias_norm_wd: true
  log_grad_norm: true

max_duration: 1ep
eval_interval: 1ep
global_train_batch_size: 16
global_eval_batch_size: 16

# System
seed: 17
device_eval_batch_size: 8
device_train_microbatch_size: 8
precision: amp_bf16            # use fp32 if running on CPU/MPS (mac) instead of CUDA

# Logging
progress_bar: true
log_to_console: true
console_log_interval: 5ba

callbacks:
  speed_monitor:
    window_size: 10
  lr_monitor: {}
  scheduled_gc: {}
  log_grad_norm:
    batch_log_interval: 5
  packing_efficiency:
    log_interval: 5

# W&B logging (uncomment + fill in to log metrics to W&B)
# loggers:
#   wandb:
#     project: modernbert-smoketest
#     entity: your-entity

# Checkpointing (optional for a smoke test)
save_interval: 1ep
save_num_checkpoints_to_keep: 1
save_folder: checkpoints/{run_name}
